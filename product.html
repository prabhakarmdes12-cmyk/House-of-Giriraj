        <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors duration-400 font-label text-xs uppercase tracking-widest nav-link link-reveal" href="bespoke.html" data-i18n="nav_private_viewing_page">Private Viewing</a>
        <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors duration-400 font-label text-xs uppercase tracking-widest nav-link link-reveal" href="heritage.html" data-i18n="nav_heritage_page">The House</a>

        <a class="menu-link" href="bespoke.html" data-i18n="nav_private_viewing_page">Private Viewing</a>
        <a class="menu-link" href="heritage.html" data-i18n="nav_heritage_page">The House</a>

      <a href="bespoke.html" class="menu-cta" data-i18n="private_viewing_cta">Private Viewing</a>

  <!-- Product content (injected by JS) -->

  <!-- Footer -->
  <footer class="bg-stone-950 border-t border-stone-800/50 light:bg-gray-100 light:border-gray-200">
    <div class="w-full px-6 md:px-12 py-12 md:py-16 flex flex-col items-center gap-8">
      <div class="flex flex-col items-center gap-6">
        <a href="index.html" class="flex items-center">
          <img class="h-8 md:h-10 w-auto" src="images/House_of_Giriraj.svg" alt="Giriraj Jewellery" />
        </a>
        <div class="flex flex-wrap justify-center gap-6 md:gap-8">
          <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors duration-400 font-label text-[10px] uppercase tracking-[0.1em] link-reveal" href="collections.html" data-i18n="nav_collections_page">Collections</a>
          <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors duration-400 font-label text-[10px] uppercase tracking-[0.1em] link-reveal" href="bespoke.html" data-i18n="nav_private_viewing_page">Private Viewing</a>
          <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors duration-400 font-label text-[10px] uppercase tracking-[0.1em] link-reveal" href="heritage.html" data-i18n="nav_heritage_page">The House</a>
        </div>
      </div>
      <div class="flex gap-6 md:gap-8 mt-4">
        <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors" href="https://instagram.com/shreegirirajjewels" target="_blank" aria-label="Instagram"><span class="material-symbols-outlined text-xl md:text-2xl">photo_camera</span></a>
        <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors" href="mailto:inquiry@shreegiriraj.com" aria-label="Email"><span class="material-symbols-outlined text-xl md:text-2xl">mail</span></a>
        <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors" href="contact.html" aria-label="Location"><span class="material-symbols-outlined text-xl md:text-2xl">location_on</span></a>
        <a class="text-[#7b7670] hover:text-[#8d743b] transition-colors" href="https://wa.me/919885055550" target="_blank" aria-label="WhatsApp"><span class="material-symbols-outlined text-xl md:text-2xl">chat</span></a>

      <p class="text-[#7b7670] font-label text-[10px] tracking-widest text-center" data-i18n="footer_rights">© 2026 Shree Giriraj Gems and Jewels. All Rights Reserved.</p>

  <!-- Scripts (order matters) -->
  <script src="js/ui.js"></script>
  <script src="js/whatsapp.js"></script>
  <script src="js/analytics.js"></script>

  <!-- Search stub (shared nav uses it) -->
  <script>
    const searchSystem = {
      openSearchModal: function () { window.location.href = "collections.html"; },
      closeSearchModal: function () {}
    };
  </script>

  <!-- Product Rendering Logic -->
  <script>
    function esc(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    document.addEventListener("DOMContentLoaded", function () {
      const params = new URLSearchParams(window.location.search);
      const productId = params.get("id");
      const product = productId ? getProductById(productId) : null;
      const main = document.getElementById("main-content");

      if (!product) {
        main.innerHTML = `
          <section class="pt-32 pb-20 px-6 text-center">
            <span class="material-symbols-outlined text-6xl text-[#999081] mb-4">search_off</span>
            <h1 class="font-serif text-2xl md:text-3xl text-on-surface mb-2">Product Not Found</h1>
            <p class="text-on-surface-variant mb-8">This piece may have been moved or is no longer available.</p>
            <a href="collections.html" class="inline-block px-8 py-3 border border-primary text-primary font-label text-sm tracking-[0.2em] uppercase hover:bg-primary hover:text-on-primary transition-all">Browse Masterpieces</a>
          </section>
        `;
        return;
      }

      // Update page title and meta
      document.title = `${product.name} | Giriraj Jewellery`;
      document.querySelector('meta[name="description"]').content = product.description;

      // Get related products
      const related = getRelatedProducts(product.id, 4);

      // Prev/next product navigation
      const productIdx = products.findIndex(p => p.id === product.id);
      const prevProduct = productIdx > 0 ? products[productIdx - 1] : null;
      const nextProduct = productIdx < products.length - 1 ? products[productIdx + 1] : null;

      // Render page
      main.innerHTML = `
        <!-- Breadcrumb -->
        <nav class="pt-24 pb-4 px-6 md:px-12 bg-surface-container-low">
          <div class="max-w-[1440px] mx-auto">
            <div class="flex items-center gap-2 text-xs tracking-widest text-outline">
              <a href="index.html" class="hover:text-primary">HOME</a>
              <span>/</span>
              <a href="collections.html" class="hover:text-primary">MASTERPIECES</a>
              ${product.collectionId ? `<span>/</span><a href="house-piece.html?id=${encodeURIComponent(product.collectionId)}" class="hover:text-primary">FROM THE HOUSE</a>` : ''}
              <span>/</span>
              <span class="text-on-surface">${esc(product.name).toUpperCase()}</span>
            </div>
          </div>
        </nav>

        <!-- Structured Data: Product -->
        <script type="application/ld+json">
        ${JSON.stringify({
          "@context": "https://schema.org",
          "@type": "Product",
          name: product.name,
          description: product.description,
          image: product.image ? [product.image].concat(product.gallery.map(g => g.image)) : [],
          category: product.category
        }, null, 2)}
        </scr${''}ipt>

        <!-- Product Section -->
        <section class="px-6 md:px-12 py-8 md:py-12 bg-background">
          <div class="max-w-[1440px] mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24">
              <!-- Gallery -->
              <div class="space-y-4">
                <div class="aspect-square bg-surface-container overflow-hidden img-zoom relative" id="gallery-main">
                  <img src="${esc(product.image)}" alt="${esc(product.name)}" class="w-full h-full object-cover" loading="lazy" />
                  ${prevProduct ? `<a href="product.html?id=${encodeURIComponent(prevProduct.id)}" class="nav-arrow absolute left-3 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center bg-white/90 hover:bg-white text-stone-800 rounded-full shadow-lg transition-all hover:scale-105 z-10" aria-label="Previous masterpiece">
                    <span class="material-symbols-outlined">chevron_left</span>
                  </a>` : ""}
                  ${nextProduct ? `<a href="product.html?id=${encodeURIComponent(nextProduct.id)}" class="nav-arrow absolute right-3 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center bg-white/90 hover:bg-white text-stone-800 rounded-full shadow-lg transition-all hover:scale-105 z-10" aria-label="Next masterpiece">
                    <span class="material-symbols-outlined">chevron_right</span>
                  </a>` : ""}
                </div>
                ${(product.gallery && product.gallery.length > 0) || (product.videos && product.videos.length > 0) ? `
                <div class="flex gap-2 overflow-x-auto pb-2" id="gallery-thumbs">
                  <button class="gallery-thumb w-20 h-20 flex-shrink-0 overflow-hidden border-2 border-primary" data-type="image" data-src="${esc(product.image)}">
                    <img src="${esc(product.image)}" alt="${esc(product.name)}" class="w-full h-full object-cover" />
                  </button>
                  ${(product.gallery || []).map((item, i) => `
                  <button class="gallery-thumb w-20 h-20 flex-shrink-0 overflow-hidden border-2 border-transparent hover:border-primary/50" data-type="image" data-src="${esc(item.image)}">
                    <img src="${esc(item.image)}" alt="${esc(item.caption || product.name)}" class="w-full h-full object-cover" />
                  </button>
                  `).join("")}
                  ${(product.videos || []).map((v, i) => `
                  <button class="gallery-thumb w-20 h-20 flex-shrink-0 overflow-hidden border-2 border-transparent hover:border-primary/50 relative" data-type="video" data-src="${esc(v.video)}" data-poster="${esc(v.poster || product.image)}">
                    <img src="${esc(v.poster || product.image)}" alt="Video" class="w-full h-full object-cover" />
                    <span class="absolute inset-0 flex items-center justify-center bg-black/30">
                      <span class="material-symbols-outlined text-white text-2xl">play_circle</span>
                    </span>
                  </button>
                  `).join("")}
                </div>
                ` : ""}
              </div>

              <!-- Product Details -->
              <div class="flex flex-col justify-center">
                <div class="mb-2">
                  <span class="text-[10px] tracking-[0.3em] uppercase text-primary">${esc(product.category)}</span>
                </div>
                <h1 class="font-serif text-3xl md:text-4xl lg:text-5xl text-on-surface mb-4">${esc(product.name)}</h1>
                <p class="text-on-surface-variant mb-6 leading-relaxed">${esc(product.description)}</p>

                <!-- Tags -->
                <div class="flex flex-wrap gap-3 mb-8">
                  ${Object.values(product.specs).map(spec => `<span class="px-3 py-1 bg-surface-container text-xs tracking-widest text-outline">${esc(spec)}</span>`).join("")}
                </div>

                <!-- CTAs -->
                <div class="flex flex-col sm:flex-row gap-4 mb-12">
                  <a href="bespoke.html" class="px-10 md:px-12 py-3 md:py-4 bg-primary text-on-primary font-label text-sm tracking-[0.2em] uppercase hover:translate-y-[-4px] transition-all duration-500 text-center">
                    Request Private Viewing
                  </a>
                  <button type="button" data-wa-btn class="px-10 md:px-12 py-3 md:py-4 border border-primary text-primary font-label text-sm tracking-[0.2em] uppercase hover:bg-primary hover:text-on-primary transition-all duration-500 text-center">
                    WhatsApp Consultation
                  </button>
                </div>

                <!-- Trust -->
                <div class="flex flex-wrap gap-6 text-xs tracking-widest text-outline">
                  <span class="flex items-center gap-2"><span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">workspace_premium</span> GIA Certified</span>
                  <span class="flex items-center gap-2"><span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">security</span> BIS Hallmarked</span>
                  <span class="flex items-center gap-2"><span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">handshake</span> Lifetime Support</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Specifications -->
        <section class="px-6 md:px-12 py-12 md:py-16 bg-surface-container">
          <div class="max-w-[1440px] mx-auto">
            <h3 class="font-serif text-2xl text-on-surface mb-8">Specifications</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="bg-surface-container-low p-6">
                <h4 class="font-label text-xs tracking-widest uppercase text-outline mb-4">Stone Details</h4>
                <div class="space-y-3 text-sm">
                  <div class="flex justify-between py-2"><span class="text-outline">Stone</span><span class="text-on-surface">${esc(product.specs.stone)}</span></div>
                  <div class="flex justify-between py-2"><span class="text-outline">Total Weight</span><span class="text-on-surface">${esc(product.specs.weight)}</span></div>
                  <div class="flex justify-between py-2"><span class="text-outline">Certification</span><span class="text-on-surface">${esc(product.specs.cert)}</span></div>
                </div>
              </div>
              <div class="bg-surface-container-low p-6">
                <h4 class="font-label text-xs tracking-widest uppercase text-outline mb-4">Metal Details</h4>
                <div class="space-y-3 text-sm">
                  <div class="flex justify-between py-2"><span class="text-outline">Metal</span><span class="text-on-surface">${esc(product.specs.metal)}</span></div>
                  <div class="flex justify-between py-2"><span class="text-outline">Craft</span><span class="text-on-surface">Handmade</span></div>
                  <div class="flex justify-between py-2"><span class="text-outline">Finish</span><span class="text-on-surface">High Polish</span></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Related Products -->
        ${related.length > 0 ? `
        <section class="px-6 md:px-12 py-16 md:py-24 bg-background">
          <div class="max-w-[1440px] mx-auto">
            <h3 class="font-serif text-2xl md:text-3xl text-on-surface mb-8">You May Also Like</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
              ${related.map(p => `
                <a href="product.html?id=${encodeURIComponent(p.id)}" class="group cursor-pointer product-card bg-surface-container block">
                  <div class="aspect-square overflow-hidden mb-4">
                    <img class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" src="${esc(p.image)}" alt="${esc(p.name)}" loading="lazy" />
                  </div>
                  <div class="p-4 text-center border-t border-surface-variant/30">
                    <h4 class="font-serif text-lg text-on-surface mb-1 product-name">${esc(p.name)}</h4>
                    <p class="text-[10px] tracking-widest uppercase text-outline mb-3">${esc(p.shortDesc)}</p>
                    <span class="text-[10px] tracking-[0.2em] uppercase text-primary">View Masterpiece</span>
                  </div>
                </a>
              `).join("")}
            </div>
          </div>
        </section>
        ` : ""}

        <!-- CTA -->
        <section class="px-6 py-16 md:py-24 bg-stone-950 text-center">
          <div class="max-w-2xl mx-auto">
            <h3 class="font-serif text-3xl md:text-4xl text-hero-primary mb-4">Can't find what you're looking for?</h3>
            <p class="text-hero-secondary mb-8">Our artisans can create bespoke pieces tailored to your vision.</p>
            <a href="bespoke.html" class="inline-block px-10 md:px-12 py-3 md:py-4 bg-primary text-on-primary font-label text-sm tracking-[0.2em] uppercase hover:translate-y-[-4px] transition-all duration-500">Start Your Commission</a>
          </div>
        </section>
      `;

      // Gallery thumb click handler
      const galleryThumbs = document.getElementById("gallery-thumbs");
      const galleryMain = document.getElementById("gallery-main");
      if (galleryThumbs && galleryMain) {
        galleryThumbs.addEventListener("click", (e) => {
          const btn = e.target.closest(".gallery-thumb");
          if (!btn) return;
          galleryThumbs.querySelectorAll(".gallery-thumb").forEach(t => t.classList.remove("border-primary"));
          btn.classList.add("border-primary");
          const type = btn.dataset.type;
          const src = btn.dataset.src;
          if (type === "image") {
            galleryMain.innerHTML = `<img src="${src}" alt="${product.name}" class="w-full h-full object-cover" loading="lazy" />`;
          } else if (type === "video") {
            const poster = btn.dataset.poster || "";
            galleryMain.innerHTML = `<video controls autoplay class="w-full h-full object-cover" poster="${poster}"><source src="${src}" type="video/mp4"></video>`;
          }
        });
      }

      // Touch swipe product navigation
      const galleryMain = document.getElementById("gallery-main");
      if (galleryMain && (prevProduct || nextProduct)) {
        let swipeStartX = 0, swipeStartY = 0, swiped = false;
        galleryMain.addEventListener("touchstart", function (e) {
          if (e.target.closest(".nav-arrow")) return;
          swipeStartX = e.changedTouches[0].screenX;
          swipeStartY = e.changedTouches[0].screenY;
          swiped = false;
        }, { passive: true });
        galleryMain.addEventListener("touchmove", function (e) {
          const dx = e.changedTouches[0].screenX - swipeStartX;
          const dy = e.changedTouches[0].screenY - swipeStartY;
          if (Math.abs(dx) > 20 && Math.abs(dx) > Math.abs(dy)) swiped = true;
        }, { passive: true });
        galleryMain.addEventListener("touchend", function (e) {
          if (!swiped) return;
          const dx = e.changedTouches[0].screenX - swipeStartX;
          const dy = e.changedTouches[0].screenY - swipeStartY;
          if (Math.abs(dx) >= 50 && Math.abs(dx) > Math.abs(dy)) {
            const target = dx < 0 ? nextProduct : prevProduct;
            if (target) window.location.href = `product.html?id=${encodeURIComponent(target.id)}`;
          }
        }, { passive: false });
      }

      // Pass product details to WhatsApp funnel
      window.__waProductData = {
        name: product.name,
        description: product.description,
        category: product.category,
        specs: product.specs
      };

      // Re-init WhatsApp funnel after DOM injection
      WhatsAppFunnel.init();

      // Re-init scroll animations
      if (typeof initScrollAnimations === "function") initScrollAnimations();
    });
  </script>
</body>
</html>
